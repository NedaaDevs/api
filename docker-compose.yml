volumes:
  valkey-data:

services:
  api:
    build: .
    ports:
      - "${PORT:-3004}:3004"
    environment:
      - NODE_ENV=production
      - ALADHAN_API_URL=${ALADHAN_API_URL}
      - BDC_API_URL=${BDC_API_URL}
      - BDC_API_KEY=${BDC_API_KEY}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - FEEDBACK_REDIS_URL=redis://valkey:6379
      - FEEDBACK_S3_ENDPOINT=${FEEDBACK_S3_ENDPOINT:-}
      - FEEDBACK_S3_ACCESS_KEY_ID=${FEEDBACK_S3_ACCESS_KEY_ID:-}
      - FEEDBACK_S3_SECRET_ACCESS_KEY=${FEEDBACK_S3_SECRET_ACCESS_KEY:-}
      - FEEDBACK_S3_BUCKET_NAME=${FEEDBACK_S3_BUCKET_NAME:-}
      - FEEDBACK_NOTIFICATION_BOT_TOKEN=${FEEDBACK_NOTIFICATION_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      # SQLite (stats + feedback) persisted on the host.
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - jaeger
      - valkey

  valkey:
    image: valkey/valkey:8-alpine
    # AOF so queued notifications survive a Valkey restart.
    command: valkey-server --appendonly yes
    volumes:
      - valkey-data:/data
    restart: unless-stopped

  jaeger:
    image: jaegertracing/jaeger:latest
    ports:
      - "127.0.0.1:16686:16686"  # UI (localhost only)
      - "4318:4318"              # OTLP HTTP (internal)
    restart: unless-stopped
